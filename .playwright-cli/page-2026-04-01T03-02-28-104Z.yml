                  - paragraph [ref=e486]: This internal working draft, prepared by Kareem Hassanein, presents a detailed legal submission to the Investigations, Complaints and Reports Committee (ICRC) regarding a professional complaint filed against him by a patient and related parties at a physiotherapy clinic. The document, dated between October 2024 and September 2025, argues for dismissal of the complaint on grounds including lack of jurisdiction, unreliable and racially biased evidence, and failure to meet the regulatory definition of a healthcare service interaction. It also challenges the College's handling of the case as discriminatory and calls for scrutiny of the opposing party's conduct and the College's compliance with human rights and equity obligations.
              - button "Completed (AI-ready) production-demands.pdf Legal Correspondence Mar 28, 2026 AI-ready Details for production-demands.pdf Actions for production-demands.pdf This legal correspondence dated March 20, 2026, from Wise Health Law to Ms. Lauren Coyle, Investigator at the College of Physiotherapists of Ontario, concerns the complaint file of Kareem Hassanein (CPO File No. 2025-0298). The letter requests the College to obtain and provide missing documents and communications related to the investigation, including audit logs, work schedules, and communications involving several individuals from July 2024 to December 2025, as well as unaltered audio recordings. It also seeks clarification on discrepancies and redactions in previously disclosed materials and requests production of any additional notes or responses relevant to the complaint." [ref=e489] [cursor=pointer]:

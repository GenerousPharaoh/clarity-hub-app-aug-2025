                  - paragraph [ref=e456]: This internal draft investigation report (Revised March 17, 2026) critiques the College's ICRC decision regarding a professional complaint filed under HPARB Board File 25-CRV-0875, highlighting that critical documentary evidence and witness testimony were disregarded. The report details alleged misconduct by a registrant from April to October 2024, including coercion, economic harm, and obstruction, and notes procedural irregularities such as investigator conflicts and scope compression directed by the respondent. It situates these issues within the applicable regulatory framework, including the Professional Misconduct Regulation, the Regulated Health Professions Act, the Human Rights Code, and the College’s Code of Ethical Conduct, emphasizing concerns of discrimination and failure to properly investigate and address the complaint.

                  - paragraph [ref=e576]: This March 27, 2026 letter from counsel to Craig Roxborough, Registrar and CEO of the College of Physiotherapists of Ontario, raises urgent human rights concerns on behalf of Kareem Hassanein, a Muslim Arab registrant alleging workplace discrimination and reprisal under the Ontario Human Rights Code. The letter asserts that existing College complaint processes are inadequate and potentially biased, requests the appointment of an independent institutional pathway to assess new evidence of discrimination and reprisal before further procedural steps, and warns that failure to act may compel external legal recourse. The correspondence emphasizes the College's legal obligations to prevent systemic discrimination and protect registrants' rights, referencing multiple related files dating back to 2024.

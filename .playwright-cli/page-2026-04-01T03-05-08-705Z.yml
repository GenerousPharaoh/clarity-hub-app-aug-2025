                      - generic [ref=e1619]: 1. Mr. Kareem Hassanein is a registrant of the College of Physiotherapists of Ontario (the “College”) and practises as a physiotherapist in Ontario. 2. Mr. Hassanein identifies as a Muslim Arab. He has consistently maintained that his protected identity has been a factor in the adverse treatment he has experienced in connection with workplace events and subsequent regulatory processes. 3. During the period in or about 2024 and 2025, Mr. Hassanein worked at a physiotherapy clinic in Ontario (the “Clinic”). Mr. Hassanein has maintained that he was the only person of Middle Eastern and Muslim identity working at the Clinic during the relevant period, and that the adverse sources underlying the College processes originated from that workplace setting (Exhibit D). 4. In or about 2024 and 2025, a professional complaint was made to the College concerning Mr. Hassanein, arising from events alleged to have occurred at or in connection with the Clinic. The College opened an investigation, including under College complaint file CPO File No. 2025-0298 (Exhibit B). 5. Mr. Hassanein has denied wrongdoing and has maintained that the complaint evidence is unreliable and affected by racial bias and stereotyping. In a detailed draft submission prepared for the College’s Investigations, Complaints and Reports Committee (“ICRC”), Mr. Hassanein set out his position that, when “all of the circumstances” are examined, the overall pattern supports an inference that discrimination was a factor in the treatment he received (Exhibit D). In doing so, Mr. Hassanein referenced the discrimination framework described in *Moore v British Columbia (Education)*, 2012 SCC 61 (Exhibit D). 6. Mr. Hassanein has also maintained that, in related regulatory proceedings, the College’s processes have not addressed his concerns of discrimination and reprisal in a manner that is independent, institutionally safe, and procedurally fair. 7. In a separate but related matter, Mr. Hassanein has documented concerns respecting another registrant’s alleged conduct in 2024, and has challenged the adequacy of the College’s handling of that matter, including on review/appeal to the Health Professions Appeal and Review Board under HPARB Board File 25-CRV-0875 (Exhibit E). 8. Mr. Hassanein has asserted that, across the related files, critical documentary evidence and witness information were not meaningfully addressed, and that investigation steps were narrowed in a manner that disadvantaged him (Exhibit E). 9. On March 20, 2026, counsel for Mr. Hassanein wrote to the College’s investigator, Ms. Lauren Coyle, regarding CPO File No. 2025-0298, requesting that the College obtain and produce missing and underlying investigative materials (Exhibit B). Among other things, counsel requested production of audit logs, work schedules, communications involving identified individuals, and unaltered audio recordings, including materials spanning July 2024 to December 2025, and sought clarification of apparent discrepancies and redactions in prior disclosure (Exhibit B). 10. On March 27, 2026, counsel for Mr. Hassanein wrote to the Registrar and CEO of the College, Mr. Craig Roxborough, raising “urgent human rights concerns” and asserting that the existing College complaint processes were inadequate to address new and material evidence of discrimination and reprisal (Exhibit A). 11. In that correspondence, Mr. Hassanein requested that the College establish or appoint an independent institutional pathway to assess the new discrimination and reprisal evidence before further procedural steps were taken in the related matters (Exhibit A). The letter further advised that, if the College failed to act, Mr. Hassanein would be compelled to pursue external legal recourse (Exhibit A). 12. On March 28, 2026, Mr. Hassanein circulated an internal email to legal colleagues concerning the draft correspondence to the Registrar and next steps, including the intention to promptly issue a civil claim in relation to alleged workplace discrimination and human rights violations said to be perpetuated through exclusionary processes, with reference to section 47(2) (Exhibit C). 13. Mr. Hassanein continues to seek timely production of relevant documents, an independent and fair consideration of the discrimination and reprisal evidence he has raised, and a resolution that addresses the ongoing personal, professional, and economic impacts arising from the events described above and the manner in which the related processes have unfolded.
